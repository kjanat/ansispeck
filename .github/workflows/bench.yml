name: Benchmarks
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun bd
      - name: Bun bench
        env:
          FORCE_COLOR: "1"
        run: |
          {
            echo 'BUN_BENCH<<BUN_BENCH_EOF'
            bun --bun bench.ts -f markdown
            echo 'BUN_BENCH_EOF'
          } >> "$GITHUB_ENV"
      - name: Size
        run: |
          {
            echo 'BUN_SIZE<<BUN_SIZE_EOF'
            bash scripts/compare-size.sh --markdown
            echo 'BUN_SIZE_EOF'
          } >> "$GITHUB_ENV"
      - name: Node bench
        env:
          FORCE_COLOR: "1"
        run: |
          {
            echo 'NODE_BENCH<<NODE_BENCH_EOF'
            node bench.ts -f markdown
            echo 'NODE_BENCH_EOF'
          } >> "$GITHUB_ENV"
      - name: Write summary
        run: |
          {
            printf '## Size\n'
            printf '%s\n\n' "$BUN_SIZE"
            printf '%s\n\n' "$BUN_BENCH"
            printf '%s\n' "$NODE_BENCH"
          } >> "$GITHUB_STEP_SUMMARY"

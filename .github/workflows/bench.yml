name: Benchmarks
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions: { contents: read }

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - { uses: actions/checkout@v6 }
      - { uses: oven-sh/setup-bun@v2 }
      - { uses: actions/setup-node@v6, with: { node-version: latest } }

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun bd

      - name: Bun bench (FORCE_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: bun, color: force }

      - name: Bun bench (NO_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: bun, color: none }

      - name: Size
        run: |
          BUN_SIZE="$(bash scripts/compare-size.sh --markdown)"
          {
            echo 'BUN_SIZE<<BUN_SIZE_EOF'
            printf '%s\n' "$BUN_SIZE"
            echo 'BUN_SIZE_EOF'
          } >> "$GITHUB_ENV"

      - name: Node bench (FORCE_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: node, color: force }

      - name: Node bench (NO_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: node, color: none }

      - name: Write summary
        run: |
          strip() { sed '/^\[\^/d' <<<"$1"; }
          footnotes="$(printf '%s\n%s\n%s\n%s\n%s\n' "$BUN_SIZE" "$BUN_BENCH_COLOR" "$NODE_BENCH_COLOR" "$BUN_BENCH_NOCOLOR" "$NODE_BENCH_NOCOLOR" | awk '/^\[\^/ && !seen[$0]++ { print }')"
          {
            printf '## Size\n'
            printf '%s\n\n' "$(strip "$BUN_SIZE")"
            printf '## Benchmarks (FORCE_COLOR=1)\n\n'
            printf '#%s\n\n' "$(strip "$BUN_BENCH_COLOR")"
            printf '#%s\n\n' "$(strip "$NODE_BENCH_COLOR")"
            printf '## Benchmarks (NO_COLOR=1)\n\n'
            printf '#%s\n\n' "$(strip "$BUN_BENCH_NOCOLOR")"
            printf '#%s\n' "$(strip "$NODE_BENCH_NOCOLOR")"
            printf '\n%s\n' "$footnotes"
          } >> "$GITHUB_STEP_SUMMARY"

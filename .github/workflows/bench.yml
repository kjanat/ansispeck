name: Benchmarks
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions: { contents: read }

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - { uses: actions/setup-node@v7, with: { node-version-file: .node-version } }
      - uses: denoland/setup-deno@v2
      - uses: oven-sh/setup-bun@v2
      - uses: kjanat/runner@master
      - uses: kjanat/install-dprint@v1
      - run: runner install --frozen bd

      - name: Bun bench (FORCE_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: bun, color: force }

      - name: Bun bench (NO_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: bun, color: none }

      - name: Deno bench (FORCE_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: deno, color: force }

      - name: Deno bench (NO_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: deno, color: none }

      - name: Size
        run: |
          cat >> "$GITHUB_ENV" <<EOF
          BUN_SIZE<<BUN_SIZE_EOF
          $(bash scripts/compare-size.sh --markdown)
          BUN_SIZE_EOF
          EOF

      - name: Node bench (FORCE_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: node, color: force }

      - name: Node bench (NO_COLOR=1)
        uses: ./.github/actions/bench
        with: { runtime: node, color: none }

      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Size
          $BUN_SIZE

          ## Benchmarks (FORCE_COLOR=1)

          #$BUN_BENCH_COLOR

          #$DENO_BENCH_COLOR

          #$NODE_BENCH_COLOR

          ## Benchmarks (NO_COLOR=1)

          #$BUN_BENCH_NOCOLOR

          #$DENO_BENCH_NOCOLOR

          #$NODE_BENCH_NOCOLOR
          EOF

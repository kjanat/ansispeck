name: Benchmarks
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    runs-on: ubuntu-latest
    outputs:
      bench: ${{ steps.bench.outputs.markdown }}
      size: ${{ steps.size.outputs.markdown }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun bd
      - name: Bench
        id: bench
        run: |
          {
            echo 'markdown<<BENCHEOF'
            bun --bun bench.ts -f markdown
            echo 'BENCHEOF'
          } >> "$GITHUB_OUTPUT"
      - name: Size
        id: size
        run: |
          {
            echo 'markdown<<SIZEEOF'
            bash scripts/compare-size.sh --markdown
            echo 'SIZEEOF'
          } >> "$GITHUB_OUTPUT"

  node:
    runs-on: ubuntu-latest
    outputs:
      bench: ${{ steps.bench.outputs.markdown }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun bd
      - name: Bench
        id: bench
        run: |
          {
            echo 'markdown<<BENCHEOF'
            node bench.ts -f markdown
            echo 'BENCHEOF'
          } >> "$GITHUB_OUTPUT"

  summary:
    needs: [bun, node]
    runs-on: ubuntu-latest
    steps:
      - name: Export summary outputs
        env:
          BUN_SIZE_OUT: ${{ needs.bun.outputs.size }}
          BUN_BENCH_OUT: ${{ needs.bun.outputs.bench }}
          NODE_BENCH_OUT: ${{ needs.node.outputs.bench }}
        run: |
          {
            echo 'BUN_SIZE<<BUN_SIZE_EOF'
            printf '%s\n' "$BUN_SIZE_OUT"
            echo 'BUN_SIZE_EOF'
            echo 'BUN_BENCH<<BUN_BENCH_EOF'
            printf '%s\n' "$BUN_BENCH_OUT"
            echo 'BUN_BENCH_EOF'
            echo 'NODE_BENCH<<NODE_BENCH_EOF'
            printf '%s\n' "$NODE_BENCH_OUT"
            echo 'NODE_BENCH_EOF'
          } >> "$GITHUB_ENV"
      - name: Write summary
        run: |
          {
            printf '## Size\n'
            printf '%s\n' "$BUN_SIZE"
            printf '\n## Bun\n'
            printf '%s\n' "$BUN_BENCH"
            printf '\n## Node\n'
            printf '%s\n' "$NODE_BENCH"
          } >> "$GITHUB_STEP_SUMMARY"

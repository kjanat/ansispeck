name: Benchmarks
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun bd
      - name: Bun bench (FORCE_COLOR=1)
        env:
          FORCE_COLOR: "1"
        run: |
          BUN_BENCH_COLOR="$(bun --bun bench.ts -f markdown)"
          {
            echo 'BUN_BENCH_COLOR<<BUN_BENCH_COLOR_EOF'
            printf '%s\n' "$BUN_BENCH_COLOR"
            echo 'BUN_BENCH_COLOR_EOF'
          } >> "$GITHUB_ENV"
      - name: Bun bench (NO_COLOR=1)
        env:
          NO_COLOR: "1"
        run: |
          BUN_BENCH_NOCOLOR="$(bun --bun bench.ts -f markdown)"
          {
            echo 'BUN_BENCH_NOCOLOR<<BUN_BENCH_NOCOLOR_EOF'
            printf '%s\n' "$BUN_BENCH_NOCOLOR"
            echo 'BUN_BENCH_NOCOLOR_EOF'
          } >> "$GITHUB_ENV"
      - name: Size
        run: |
          BUN_SIZE="$(bash scripts/compare-size.sh --markdown)"
          {
            echo 'BUN_SIZE<<BUN_SIZE_EOF'
            printf '%s\n' "$BUN_SIZE"
            echo 'BUN_SIZE_EOF'
          } >> "$GITHUB_ENV"
      - name: Node bench (FORCE_COLOR=1)
        env:
          FORCE_COLOR: "1"
        run: |
          NODE_BENCH_COLOR="$(node bench.ts -f markdown)"
          {
            echo 'NODE_BENCH_COLOR<<NODE_BENCH_COLOR_EOF'
            printf '%s\n' "$NODE_BENCH_COLOR"
            echo 'NODE_BENCH_COLOR_EOF'
          } >> "$GITHUB_ENV"
      - name: Node bench (NO_COLOR=1)
        env:
          NO_COLOR: "1"
        run: |
          NODE_BENCH_NOCOLOR="$(node bench.ts -f markdown)"
          {
            echo 'NODE_BENCH_NOCOLOR<<NODE_BENCH_NOCOLOR_EOF'
            printf '%s\n' "$NODE_BENCH_NOCOLOR"
            echo 'NODE_BENCH_NOCOLOR_EOF'
          } >> "$GITHUB_ENV"
      - name: Write summary
        run: |
          {
            printf '## Size\n'
            printf '%s\n\n' "$BUN_SIZE"
            printf '## Benchmarks (FORCE_COLOR=1)\n\n'
            printf '%s\n\n' "$BUN_BENCH_COLOR"
            printf '%s\n\n' "$NODE_BENCH_COLOR"
            printf '## Benchmarks (NO_COLOR=1)\n\n'
            printf '%s\n\n' "$BUN_BENCH_NOCOLOR"
            printf '%s\n' "$NODE_BENCH_NOCOLOR"
          } >> "$GITHUB_STEP_SUMMARY"

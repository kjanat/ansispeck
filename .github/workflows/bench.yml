name: Benchmarks
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun --bun bd

      - name: Benchmarks (Bun)
        run: bun --bun bench.ts -f markdown |& tee -a "$GITHUB_STEP_SUMMARY"

      - name: Benchmarks (Node)
        run: node bench.ts -f markdown |& tee -a "$GITHUB_STEP_SUMMARY"

      - name: Size comparison
        run: bash scripts/compare-size.sh --markdown |& tee -a "$GITHUB_STEP_SUMMARY"

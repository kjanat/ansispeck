name: Run benchmark
description: Runs a benchmark for the given runtime and captures output to GITHUB_ENV/GITHUB_OUTPUT

inputs:
  runtime:
    description: Runtime to benchmark (bun, deno, or node)
    required: true
  color:
    description: "Color mode: 'force' sets FORCE_COLOR=1, 'none' sets NO_COLOR=1"
    required: true
  compact:
    description: Omit reusable notes from Markdown output
    required: false
    default: "true"

outputs:
  result:
    description: The benchmark output (markdown table)
    value: ${{ steps.run.outputs.result }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env: { RUNTIME: "${{ inputs.runtime }}", COLOR: "${{ inputs.color }}", COMPACT: "${{ inputs.compact }}" }
      run: bash "${GITHUB_ACTION_PATH}/run.sh"
